version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: matcha_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend
  postgres:
    image: postgres:15
    container_name: matcha_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: matcha
      POSTGRES_PASSWORD: matcha123
      POSTGRES_DB: matcha_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: matcha_backend
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: matcha_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:



